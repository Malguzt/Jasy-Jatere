services:
  backend:
    build:
      context: ./backend
    container_name: ipcam-backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend/data:/app/data
      - ./recordings:/app/recordings
    environment:
      - CAMERA_DEFAULT_USER=admin
      - CAMERA_DEFAULT_PASS=PerroN3gro
      - CAMERA_KEEPALIVE_ENABLED=0
      - CAMERA_KEEPALIVE_SYNC_MS=10000
      - CAMERA_KEEPALIVE_SOURCE_INDEX=1
      - CAMERA_KEEPALIVE_TRANSPORT=udp
      - CAMERA_CREDENTIALS_MASTER_KEY=${CAMERA_CREDENTIALS_MASTER_KEY:-}
      - METADATA_STORE_DRIVER=sqlite
      - METADATA_SQLITE_PATH=/app/data/metadata/metadata.db
      - MAPPER_URL=http://mapper:5002
      - DETECTOR_URL=http://detector:5000
      - RECONSTRUCTOR_URL=http://reconstructor:5001
      - STREAM_RUNTIME_ENABLED=${STREAM_RUNTIME_ENABLED:-1}
      - STREAM_WEBSOCKET_GATEWAY_ENABLED=${STREAM_WEBSOCKET_GATEWAY_ENABLED:-1}
      - STREAM_WEBRTC_ENABLED=${STREAM_WEBRTC_ENABLED:-0}
      - STREAM_WEBRTC_REQUIRE_HTTPS=${STREAM_WEBRTC_REQUIRE_HTTPS:-1}
      - STREAM_WEBRTC_SIGNALING_URL=${STREAM_WEBRTC_SIGNALING_URL:-}
      - STREAM_WEBRTC_ICE_SERVERS_JSON=${STREAM_WEBRTC_ICE_SERVERS_JSON:-}
      - STREAM_WEBRTC_SIGNALING_RETRIES=${STREAM_WEBRTC_SIGNALING_RETRIES:-1}
      - STREAM_GATEWAY_API_URL=${STREAM_GATEWAY_API_URL:-}
      - LEGACY_COMPAT_EXPORTS_ENABLED=0
      - RECORDING_RETENTION_ENABLED=0
      - RECORDING_RETENTION_INTERVAL_MS=3600000
      - RECORDING_RETENTION_MAX_AGE_DAYS=${RECORDING_RETENTION_MAX_AGE_DAYS:-}
      - RECORDING_RETENTION_MAX_ENTRIES=${RECORDING_RETENTION_MAX_ENTRIES:-}
      - RECORDINGS_MAX_SIZE_GB=${RECORDINGS_MAX_SIZE_GB:-50}
      - RECORDINGS_DELETE_OLDEST_BATCH=${RECORDINGS_DELETE_OLDEST_BATCH:-100}
      - OBSERVATION_MAX_ENTRIES=${OBSERVATION_MAX_ENTRIES:-2500}
      - MAP_PLAN_A_ENABLED=1
      - MAP_PLAN_B_ENABLED=1
      - MAP_PLAN_C_ENABLED=1
      - MAP_PLAN_D_ENABLED=1
      - MAP_APPLY_MANUAL_CORRECTIONS=1
      - MAP_USE_DETECTOR_EVENTS_FALLBACK=0
      - MAP_MAPPER_TIMEOUT_MS=90000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  stream-gateway:
    build:
      context: ./backend
    container_name: ipcam-stream-gateway
    command: ["node", "stream-gateway-server.js"]
    profiles: ["stream-gateway"]
    ports:
      - "4100:4100"
    volumes:
      - ./backend/data:/app/data
      - ./recordings:/app/recordings
    environment:
      - STREAM_GATEWAY_PORT=4100
      - METADATA_STORE_DRIVER=sqlite
      - METADATA_SQLITE_PATH=/app/data/metadata/metadata.db
      - RECONSTRUCTOR_URL=http://reconstructor:5001
      - CAMERA_KEEPALIVE_ENABLED=0
      - CAMERA_KEEPALIVE_SYNC_MS=10000
      - CAMERA_KEEPALIVE_SOURCE_INDEX=1
      - CAMERA_KEEPALIVE_TRANSPORT=udp
      - CAMERA_CREDENTIALS_MASTER_KEY=${CAMERA_CREDENTIALS_MASTER_KEY:-}
      - STREAM_RUNTIME_ENABLED=${STREAM_RUNTIME_ENABLED:-1}
      - STREAM_WEBSOCKET_GATEWAY_ENABLED=${STREAM_WEBSOCKET_GATEWAY_ENABLED:-1}
      - STREAM_WEBRTC_ENABLED=${STREAM_WEBRTC_ENABLED:-0}
      - STREAM_WEBRTC_REQUIRE_HTTPS=${STREAM_WEBRTC_REQUIRE_HTTPS:-1}
      - STREAM_WEBRTC_SIGNALING_URL=${STREAM_WEBRTC_SIGNALING_URL:-}
      - STREAM_WEBRTC_ICE_SERVERS_JSON=${STREAM_WEBRTC_ICE_SERVERS_JSON:-}
      - STREAM_WEBRTC_SIGNALING_RETRIES=${STREAM_WEBRTC_SIGNALING_RETRIES:-1}
      - LEGACY_COMPAT_EXPORTS_ENABLED=0
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ipcam-frontend
    ports:
      - "5173:5173"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:5173 >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy

  detector:
    build:
      context: ./detector
    container_name: ipcam-detector
    volumes:
      - ./recordings:/app/recordings
    environment:
      - CAMERA_DEFAULT_USER=admin
      - CAMERA_DEFAULT_PASS=PerroN3gro
      - CONTROL_PLANE_URL=http://backend:4000
      - USE_CONTROL_PLANE_CAMERA_CONFIG=1
      - REQUIRE_CONTROL_PLANE_CAMERA_CONFIG=1
      - USE_CONTROL_PLANE_RETENTION_CONFIG=1
      - REQUIRE_CONTROL_PLANE_RETENTION_CONFIG=0
      - RETENTION_CONFIG_TTL_SEC=60
      - USE_CONTROL_PLANE_PERCEPTION_INGEST=1
      - USE_CONTROL_PLANE_RECORDING_CATALOG=1
      - MOTION_API_BASE=http://backend:4000/api/camera-motion
      - DETECTOR_OUTPUT_STREAM_BASE=http://reconstructor:5001/stream
      - DETECTOR_MONITOR_TRANSPORT=udp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/status',timeout=3).getcode()==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  reconstructor:
    build:
      context: ./reconstructor
    container_name: ipcam-reconstructor
    environment:
      - TEMPORAL_WINDOW_SIZE=7
      - TEMPORAL_MIN_FRAMES=4
      - TEMPORAL_DIFF_SIGMA=20.0
      - TEMPORAL_CURRENT_BIAS=1.5
      - MOTION_API_BASE=http://backend:4000/api/camera-motion
    volumes:
      - ./recordings:/app/recordings
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5001/health',timeout=3).getcode()==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  mapper:
    build:
      context: ./mapper
    container_name: ipcam-mapper
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5002/health',timeout=3).getcode()==200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
