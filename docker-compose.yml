services:
  backend:
    build: 
      context: ./backend
    container_name: ipcam-backend
    network_mode: "host"
    volumes:
      - ./backend/data:/app/data
      - ./recordings:/app/recordings
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ipcam-frontend
    network_mode: "host"
    restart: unless-stopped
    depends_on:
      - backend

  detector:
    build:
      context: ./detector
    container_name: ipcam-detector
    network_mode: "host"
    volumes:
      - ./backend/data:/app/data
      - ./recordings:/app/recordings
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      - backend

  reconstructor:
    build:
      context: ./reconstructor
    container_name: ipcam-reconstructor
    network_mode: "host"
    volumes:
      - ./backend/data:/app/data
      - ./recordings:/app/recordings
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    depends_on:
      - backend
